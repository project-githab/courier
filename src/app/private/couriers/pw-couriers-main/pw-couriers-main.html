<div class="flex bg-linen flex-grow">

  <app-cp-panel class="close-tablet"></app-cp-panel>

  <div class="flex flex-col width-full">

    <app-cp-header class="bg-white"></app-cp-header>

    <div class="flex width-full justify-center">

      <div class="flex padding-24 max-width-1400 width-full flex-col">


        <div class="flex width-full between column-phone">
          <div class="flex justify-center flex-col">
            <div class="flex font-size-20 font-weight-700">Ваша команда</div>
            <div class="flex font-size-16 margin-top-5">16 сотрудников · 12 на линии</div>
          </div>
          <div class="flex button-padding bg-yellow-hover radius-10 pointer width-content margin-top-phone">+ Добавить
            сотрудника
          </div>
        </div>


        <div class="open-phone margin-top-20 justify-end relative z-index-1">

          <div class="flex absolute font-size-18 flex-col bg-white padding-10 radius-10 border-10 menu"
               [class.menu-open]="isMenuOpen()">
            <div routerLink="/couriers" class="flex height-30 items-center padding-10 pointer">Все 16</div>
            <div routerLink="/couriers/free" class="flex height-30 items-center padding-10 pointer">Свободны 7</div>
            <div routerLink="/couriers/delivery" class="flex height-30 items-center padding-10 pointer">На доставке 3
            </div>
            <div routerLink="/couriers/line" class="flex height-30 items-center padding-10 pointer">Не на линии 4</div>
          </div>

          <div class="flex" (click)="toggleMenu($event)">
            <svg xmlns="http://www.w3.org/2000/svg" height="40px" viewBox="0 -960 960 960" width="40px" fill="#000000">
              <path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z" />
            </svg>
          </div>

        </div>

        <div class="flex margin-top-20 font-size-18 gap-10 close-phone">
          <div routerLink="/couriers" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
               class="flex bg-white padding-10 radius-10 pointer">Все　16
          </div>
          <div routerLink="/couriers/free" routerLinkActive="active" class="flex bg-white padding-10 radius-10 pointer">
            Свободны　7
          </div>
          <div routerLink="/couriers/delivery" routerLinkActive="active"
               class="flex bg-white padding-10 radius-10 pointer">На доставке　3
          </div>
          <div routerLink="/couriers/line" routerLinkActive="active" class="flex bg-white padding-10 radius-10 pointer">
            Не на линии　4
          </div>
        </div>

        <div class="flex margin-top-20">

          @if (isOrdersPage()) {
            <app-pw-couriers></app-pw-couriers>
          } @else if (isActiveOrdersPage()) {
            <app-pw-free></app-pw-free>
          } @else if (isStoryPage()) {
            <app-pw-delivery></app-pw-delivery>
          } @else if (isLinePage()) {
            <app-pw-line></app-pw-line>
          }


        </div>

      </div>

    </div>

  </div>


</div>
