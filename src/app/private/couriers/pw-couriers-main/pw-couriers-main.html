<div class="flex bg-linen flex-grow">

  <app-cp-panel class="close-component"></app-cp-panel>

  <div class="flex flex-col width-full">

    <app-cp-header class="bg-white"></app-cp-header>

    <div class="flex width-full justify-center">

      <div class="flex padding-24 max-width-1400 width-full flex-col">

        <div class="flex width-full between">
          <div class="flex justify-center flex-col">
            <div class="flex font-size-20 font-weight-700">Ваша команда</div>
            <div class="flex font-size-16 margin-top-5">16 сотрудников · 12 на линии</div>
          </div>
          <div class="flex button-padding bg-yellow-hover radius-10 pointer">+ Добавить сотрудника</div>
        </div>

        <div class="flex margin-top-20 font-size-18 gap-10">
          <div routerLink="/couriers" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
               class="flex bg-white padding-10 radius-10 pointer">Все　16
          </div>
          <div routerLink="/couriers/free" routerLinkActive="active" class="flex bg-white padding-10 radius-10 pointer">
            Свободны　7
          </div>
          <div routerLink="/couriers/delivery" routerLinkActive="active"
               class="flex bg-white padding-10 radius-10 pointer">На доставке　3
          </div>
          <div routerLink="/couriers/line" routerLinkActive="active" class="flex bg-white padding-10 radius-10 pointer">
            Не на линии　4
          </div>
        </div>

        <div class="flex margin-top-20">

          @if (isOrdersPage()) {
            <app-pw-couriers></app-pw-couriers>
          } @else if (isActiveOrdersPage()) {
            <app-pw-free></app-pw-free>
          } @else if (isStoryPage()) {
            <app-pw-delivery></app-pw-delivery>
          } @else if (isLinePage()) {
            <app-pw-line></app-pw-line>
          }


        </div>

      </div>

    </div>

  </div>


</div>
